spring.application.name=spatium-backend

# 로컬 전용 실제 비밀값 파일을 선택적으로 불러온다 (없으면 무시됨, git에는 절대 커밋 금지)
#  - 작업 디렉토리(spatium-backend/) 바로 아래 application-secret.properties
#  - 운영 배포 시에는 이 파일 대신 실제 OS 환경변수로 주입할 것
spring.config.import=optional:file:./application-secret.properties

# JWT 서명 비밀키 : 환경변수(JWT_SECRET)로만 주입 (기본값 없음)
#  - 운영 환경에서 미설정 시 서버가 기동되지 않음 (공개된 기본키로 뜨는 사고 방지)
#  - 로컬 개발용 기본값은 application-dev.properties에만 있음
spatium.jwt.secret=${JWT_SECRET}

# refreshToken httpOnly 쿠키의 Secure 속성
#  - HTTPS 운영 환경에서는 반드시 true (COOKIE_SECURE=true 주입)
#  - 로컬 http 개발 환경에서는 false여야 쿠키가 저장됨
spatium.cookie.secure=${COOKIE_SECURE:false}

######################################
## 클라이언트 IP 판별 (rate limit용) ##
######################################
# 로그인/회원가입/GPU 작업 제한은 getRemoteAddr() 기반 클라이언트 IP를 키로 사용한다.
#
# 현재 운영 구성이 [브라우저 -> Caddy -> Nginx -> Spring] 으로 리버스 프록시 2단이라
# 기본값을 native로 둔다.
#  - native : Tomcat RemoteIpValve가 동작. 사설 IP 대역(도커 내부 172.x 등)의 프록시가
#    보낸 X-Forwarded-For만 신뢰해서 getRemoteAddr()이 실제 클라이언트 IP를 반환한다.
#    (Nginx가 X-Forwarded-For를 $proxy_add_x_forwarded_for로 '덧붙여' 넘겨야 함.
#     $remote_addr로 '덮어쓰면' 진짜 클라이언트 IP가 지워져 이 설정이 무의미해진다)
#  - 미설정 시 모든 클라이언트가 프록시 IP 하나로 묶여, 한 사람의 작업이 전체를 막거나
#    가입 제한(10분 10회)이 서비스 전체 합산으로 걸리는 문제가 생긴다.
#
# (주의) 프록시 없이 서버를 직접 노출하는 구성으로 바꾼다면 반드시
# FORWARD_HEADERS_STRATEGY=none 을 주입할 것. 프록시가 없는데 native로 두면
# 공격자가 X-Forwarded-For 헤더를 위조해 IP 기반 제한을 통째로 우회할 수 있다.
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:native}

######################################
## 소셜 로그인 ID Token 검증 설정 ##
######################################
# ID Token의 aud(audience) 검증용 클라이언트 ID (클라이언트 ID는 공개값이라 기본값 허용)
spatium.oauth.google.client-id=${GOOGLE_CLIENT_ID:75882144038-uo097qevmfnnb3in5q62n833ofptlnu1.apps.googleusercontent.com,75882144038-c0nfcrirlhlod41gl8esi8rtbne5gj4t.apps.googleusercontent.com}
# Apple 로그인 클라이언트 ID (Service ID/Bundle ID) - 미설정 시 APPLE 로그인 차단됨
#  - 웹(Services ID)과 iOS 네이티브(App/Bundle ID)가 서로 다른 aud로 id_token을 발급받으므로
#    콤마로 구분해 둘 다 등록한다 (검증 로직은 SocialIdTokenVerifier에서 콤마 분리 후 매칭)
spatium.oauth.apple.client-id=${APPLE_CLIENT_ID:name.dongharyu.spatium.auth,name.dongharyu.spatium.jjin}

# Apple client_secret(JWT, ES256) 서명용 값들 - 전부 실제 비밀값이라 기본값 없음
#  - Team ID : Apple Developer 계정의 팀 ID (예: 322PTHJ258)
#  - Key ID : Sign in with Apple용으로 발급받은 키의 Key ID
#  - Private Key(base64) : 발급받은 .p8 파일 원문을 base64 한 줄로 인코딩한 값
#    (base64 -w0 AuthKey_XXXX.p8 로 생성. 로컬은 application-secret.properties로 주입,
#     운영은 APPLE_TEAM_ID/APPLE_KEY_ID/APPLE_PRIVATE_KEY_B64 환경변수로 주입)
spatium.oauth.apple.team-id=${APPLE_TEAM_ID:}
spatium.oauth.apple.key-id=${APPLE_KEY_ID:}
spatium.oauth.apple.private-key-b64=${APPLE_PRIVATE_KEY_B64:}

### 활성화할 프로파일(dev, prod, test 등) 지정
# - 개발 편의를 위해 기본값 dev 유지 (환경변수 없이 실행하면 dev로 동작)
# - (주의) 운영(AWS 등) 배포 시에는 반드시 SPRING_PROFILES_ACTIVE=prod 등
#   dev가 아닌 값을 주입할 것. dev로 뜨면 git에 공개된 개발용 JWT 키/DB
#   접속정보가 그대로 적용되어 토큰 위조/DB 접근이 가능해짐
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 코드 수정 시 자동 재시작(devtools) 설정은 dev 프로필 전용으로 이동
#  - application-dev.properties 참고 (devtools 의존성 자체가 developmentOnly
#    스코프라 운영 jar에는 포함되지 않지만, 설정도 dev에만 두는 것이 명확함)

######################################
## Database - Oracle 관련 설정 ##
######################################
# 드라이브 클래스(자바프로그램 기반의 오라클 라이브러리)
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
# DB 접속정보 : 환경변수로만 주입 (기본값 없음)
#  - 운영 환경에서 미설정 시 서버가 기동되지 않음 (접속정보 커밋 방지)
#  - 로컬 개발용 기본값은 application-dev.properties에만 있음
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

######################################
## 파일 업로드 크기 제한 ##
######################################
# 3D 스캔(USDZ) 업로드 기준 : 파일당 100MB, 요청 전체 110MB (metadata 등 포함 여유분)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB

######################################
## Internal AI gateway / file storage ##
######################################
# Browser requests go to Spring /api/ai/**. Only Spring calls the Python service.
spatium.ai.base-url=${AI_BASE_URL:http://127.0.0.1:8000}
spatium.ai.internal-api-key=${AI_INTERNAL_API_KEY:}
spatium.ai.request-timeout=${AI_REQUEST_TIMEOUT:PT15M}
spring.mvc.async.request-timeout=${SPRING_ASYNC_REQUEST_TIMEOUT:930000}

# Empty means {backend working directory}/data. DB columns store object keys only.
spatium.storage.root=${SPATIUM_STORAGE_ROOT:}

######################################
## JPA(Java Persistence API or Jakarta Persistence Access) 관련 설정 ##
######################################
# DB 입력/수정/삭제에 대하여 자동 commit
spring.jpa.hibernate.ddl-auto=none

# SQL 로그 출력(show-sql)은 dev 프로필 전용으로 이동 (운영 로그에 SQL 미기록)
