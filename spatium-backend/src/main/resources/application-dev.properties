######################################
## dev 프로필 전용 설정 ##
##  - spring.profiles.active=dev일 때만 적용됨
##  - 운영(prod) 배포 시에는 SPRING_PROFILES_ACTIVE를 dev가 아닌 값으로
##    설정해야 하며, 그 경우 이 파일의 값들은 적용되지 않음
######################################

# 로컬 개발용 JWT 서명 키 기본값
#  - JWT_SECRET 환경변수가 있으면 그 값을 우선 사용
#  - 이 키는 git에 공개되어 있으므로 절대 운영에서 사용 금지
spatium.jwt.secret=${JWT_SECRET:spatium-local-development-jwt-secret-change-me-32bytes}

# 개발용 DB 접속정보 (환경변수가 있으면 그 값을 우선 사용)
#  - 실제 접속정보는 git에 커밋하지 않는다. 각자 로컬 환경변수(DB_URL/DB_USERNAME/
#    DB_PASSWORD)로 주입하거나, git에 추적되지 않는 로컬 설정 파일에 둘 것
#  - 아래는 로컬 기동용 placeholder(더미)이며 실제 서버 접속정보가 아니다.
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/xe}
spring.datasource.username=${DB_USERNAME:CHANGE_ME}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}

# 개발 시에만 실행 SQL을 콘솔에 출력
spring.jpa.show-sql=true
