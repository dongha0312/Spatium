<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Spatium 시스템 구성</title>
  <desc id="desc">iOS 앱, 웹 클라이언트, Spring Boot API 서버, FastAPI AI 서버, Oracle 데이터베이스와 파일 저장소의 연결 구조</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#eef2ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4f46e5" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9333ea" />
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; fill: #0f172a; }
      .section { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; fill: #64748b; letter-spacing: 1.4px; }
      .box-title { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; fill: #0f172a; }
      .box-sub { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; fill: #475569; }
      .label { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; fill: #4338ca; }
      .storage-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; fill: #0f172a; }
      .storage-sub { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#background)" />
  <text x="60" y="58" class="title">Spatium System Architecture</text>

  <text x="60" y="112" class="section">CLIENT</text>
  <text x="465" y="112" class="section">SERVER</text>
  <text x="940" y="112" class="section">STORAGE</text>

  <g filter="url(#shadow)">
    <rect x="60" y="140" width="280" height="115" rx="20" fill="#ffffff" stroke="#c7d2fe" stroke-width="2" />
    <circle cx="104" cy="183" r="22" fill="#e0e7ff" />
    <rect x="95" y="167" width="18" height="31" rx="4" fill="none" stroke="#4f46e5" stroke-width="3" />
    <circle cx="104" cy="193" r="1.8" fill="#4f46e5" />
    <text x="140" y="180" class="box-title">iOS 앱</text>
    <text x="140" y="207" class="box-sub">RoomPlan · LiDAR 공간 스캔</text>
    <text x="140" y="230" class="box-sub">SwiftUI · iOS 17+</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="315" width="280" height="115" rx="20" fill="#ffffff" stroke="#bae6fd" stroke-width="2" />
    <circle cx="104" cy="358" r="22" fill="#e0f2fe" />
    <rect x="91" y="347" width="26" height="18" rx="2" fill="none" stroke="#0284c7" stroke-width="3" />
    <path d="M99 370h10M104 365v5" stroke="#0284c7" stroke-width="3" stroke-linecap="round" />
    <text x="140" y="355" class="box-title">웹 클라이언트</text>
    <text x="140" y="382" class="box-sub">React · Three.js 3D 에디터</text>
    <text x="140" y="405" class="box-sub">프로젝트 및 가구 관리</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="465" y="140" width="300" height="115" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2" />
    <circle cx="509" cy="183" r="22" fill="#dcfce7" />
    <path d="M497 173h24M497 183h24M497 193h24" stroke="#16a34a" stroke-width="3" stroke-linecap="round" />
    <circle cx="501" cy="173" r="2" fill="#16a34a" />
    <circle cx="501" cy="183" r="2" fill="#16a34a" />
    <circle cx="501" cy="193" r="2" fill="#16a34a" />
    <text x="545" y="180" class="box-title">API 서버</text>
    <text x="545" y="207" class="box-sub">Spring Boot · JWT · REST API</text>
    <text x="545" y="230" class="box-sub">인증 · 프로젝트 · 방 · 가구</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="465" y="315" width="300" height="115" rx="20" fill="#ffffff" stroke="#e9d5ff" stroke-width="2" />
    <circle cx="509" cy="358" r="22" fill="#f3e8ff" />
    <path d="M498 366l11-21 11 21M502 359h14" fill="none" stroke="#9333ea" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <text x="545" y="355" class="box-title">AI 서버</text>
    <text x="545" y="382" class="box-sub">FastAPI · PyTorch</text>
    <text x="545" y="405" class="box-sub">이미지 분할 · GLB 생성</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="140" width="220" height="115" rx="20" fill="#ffffff" stroke="#fed7aa" stroke-width="2" />
    <ellipse cx="974" cy="172" rx="17" ry="7" fill="#ffedd5" stroke="#ea580c" stroke-width="2" />
    <path d="M957 172v27c0 4 8 7 17 7s17-3 17-7v-27M957 185c0 4 8 7 17 7s17-3 17-7" fill="none" stroke="#ea580c" stroke-width="2" />
    <text x="1010" y="180" class="storage-title">Oracle DB</text>
    <text x="1010" y="207" class="storage-sub">사용자 · 프로젝트</text>
    <text x="1010" y="228" class="storage-sub">방 · 가구 데이터</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="315" width="220" height="115" rx="20" fill="#ffffff" stroke="#fde68a" stroke-width="2" />
    <path d="M956 349h15l5 6h18v25h-38z" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" stroke-linejoin="round" />
    <text x="1010" y="355" class="storage-title">파일 저장소</text>
    <text x="1010" y="382" class="storage-sub">USDZ · GLB</text>
    <text x="1010" y="403" class="storage-sub">메타데이터 JSON</text>
  </g>

  <path d="M340 184H465" fill="none" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrow-blue)" />
  <rect x="356" y="151" width="96" height="24" rx="12" fill="#eef2ff" />
  <text x="404" y="168" text-anchor="middle" class="label">스캔 업로드</text>

  <path d="M340 350C405 350 400 220 465 220" fill="none" stroke="#4f46e5" stroke-width="3" marker-start="url(#arrow-blue)" marker-end="url(#arrow-blue)" />
  <rect x="365" y="270" width="78" height="24" rx="12" fill="#eef2ff" />
  <text x="404" y="287" text-anchor="middle" class="label">REST API</text>

  <path d="M340 390C390 390 410 390 465 390" fill="none" stroke="#9333ea" stroke-width="3" stroke-dasharray="7 6" marker-start="url(#arrow-purple)" marker-end="url(#arrow-purple)" />

  <path d="M765 184H930" fill="none" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrow-blue)" />
  <path d="M765 220C840 220 850 357 930 357" fill="none" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrow-blue)" />
</svg>
